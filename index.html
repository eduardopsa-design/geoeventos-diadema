<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b2f6b" />
  <title>GeoEventos Diadema</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">📍</div>
      <div>
        <h1>GeoEventos Diadema</h1>
        <p>Mapa inteligente de eventos da cidade</p>
      </div>
    </div>

    <div class="filters">
      <input
        id="searchInput"
        type="search"
        placeholder="Pesquisar evento, bairro, região ou endereço..."
        aria-label="Pesquisar eventos"
      />

      <select id="dateFilter" aria-label="Filtrar por data">
        <option value="todos">Todas as datas</option>
        <option value="hoje">Hoje</option>
        <option value="amanha">Amanhã</option>
        <option value="semana">Próximos 7 dias</option>
        <option value="mes">Próximos 30 dias</option>
      </select>

      <select id="regionFilter" aria-label="Filtrar por região">
        <option value="">Todas as regiões</option>
      </select>

      <select id="secretariaFilter" aria-label="Filtrar por secretaria">
        <option value="">Todas as secretarias</option>
      </select>

      <button id="calendarBtn" type="button">🗓️ Calendário</button>
      <button id="todayBtn" type="button">📅 O que tem hoje?</button>
      <button id="heatBtn" type="button">🔥 Mapa de Calor</button>
    </div>
  </header>

  <main>
    <div id="map"></div>
  </main>


  <aside id="calendarPanel" class="calendar-panel" aria-hidden="true">
    <div class="calendar-header">
      <button id="prevMonthBtn" type="button" aria-label="Mês anterior">‹</button>
      <h2 id="calendarTitle">Calendário</h2>
      <button id="nextMonthBtn" type="button" aria-label="Próximo mês">›</button>
      <button id="closeCalendarBtn" class="calendar-close" type="button" aria-label="Fechar calendário">×</button>
    </div>

    <div class="calendar-weekdays" aria-hidden="true">
      <span>SEG</span>
      <span>TER</span>
      <span>QUA</span>
      <span>QUI</span>
      <span>SEX</span>
      <span>SÁB</span>
      <span>DOM</span>
    </div>

    <div id="calendarGrid" class="calendar-grid"></div>

    <div class="calendar-legend">
      <span><i class="legend-dot few"></i> 1 a 3</span>
      <span><i class="legend-dot medium"></i> 4 a 7</span>
      <span><i class="legend-dot many"></i> 8 ou mais</span>
    </div>

    <div class="calendar-actions">
      <button id="clearCalendarDateBtn" type="button">Mostrar todas as datas</button>
    </div>

    <div id="calendarSelection" class="calendar-selection">
      Clique em uma data para filtrar o mapa.
    </div>
  </aside>

  <div id="statusBox">Carregando eventos...</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <script src="script.js"></script>
</body>
</html>
